# =============================================================================
# FireLens (Fluent Bit) カスタム設定 - severity ベースのログルーティング
# Spec: ecs-otel-log-pipeline / Task 16.1
# Design: design.md "3. FireLens_Router (Fluent Bit 設定)"
#
# ECS タスク定義 (17.2) は firelensConfiguration の config-file-value で
#   /fluent-bit/etc/custom.conf
# を参照する。FireLens はこのファイルを生成済みメイン設定へ @INCLUDE する。
#
# [INPUT] は FireLens が forward プラグインで自動注入する
# (awsfirelens ログドライバ経由のアプリ stdout)。
# アプリコンテナ由来のレコードはタグ `app-firelens*` で届く。
#
# 重要 (FireLens のレコード構造):
#   awsfirelens ログドライバは、アプリ stdout の 1 行を record の "log" キーに
#   **文字列のまま** 格納する (例: {"log":"{\"severityNumber\":17,...}",
#   "container_name":"app","ecs_task_arn":...})。
#   そのため severityNumber 等はトップレベルに存在せず、まず "log" を JSON として
#   パースして展開する必要がある。これを行わないと rewrite_tag ($severityNumber) が
#   一切マッチせず、ERROR/FATAL が CloudWatch にも Iceberg にも配信されない。
# =============================================================================

# -----------------------------------------------------------------------------
# parser 定義の読み込み (otel_json)
#   FireLens が本ファイルを @INCLUDE する際、[SERVICE] のキーは生成済みメイン設定の
#   [SERVICE] へマージされる。Parsers_File は加算的に読み込まれるため、ここで
#   カスタム parser を追加しても既定の動作を壊さない。
# -----------------------------------------------------------------------------
[SERVICE]
    Parsers_File /fluent-bit/etc/parsers.conf

# -----------------------------------------------------------------------------
# 0) "log" 文字列を JSON パースしてトップレベルへ展開する
#    Reserve_Data On  : OTel フィールド以外 (ecs_* / container_* 等) を保持
#    Preserve_Key Off : 元の "log" キーは展開後に除去 (既定)
#    関連要件: 3.2 (stdout を入力として受信), 3.3 (severity に基づく振り分けの前提)
# -----------------------------------------------------------------------------
[FILTER]
    Name         parser
    Match        app-firelens*
    Key_Name     log
    Parser       otel_json
    Reserve_Data On

# -----------------------------------------------------------------------------
# 1) severity ベースのタグ派生 (ERROR 以上 -> error.*)
#    展開済みの $severityText が ERROR / FATAL のレコードに error.* を付与する。
#    重要: rewrite_tag の正規表現は **文字列フィールドにのみ** マッチし、整数値
#    ($severityNumber) には一致しない。そのため文字列の $severityText で判定する
#    (アプリの severityText は TRACE/DEBUG/INFO/WARN/ERROR/FATAL のいずれか。
#     ^(ERROR|FATAL) は ERROR=17 と FATAL=21 (ERROR 以上) だけに一致する)。
#    第4引数 true で元レコード (app-firelens*) を保持し、全ログ (full-logs) と
#    error.* の両系統を両立させる。
#    関連要件: 3.3 (severity に基づく振り分け), 3.5 (ERROR 以上を Error_Log 扱い)
# -----------------------------------------------------------------------------
[FILTER]
    Name          rewrite_tag
    Match         app-firelens*
    Rule          $severityText ^(ERROR|FATAL) error.$TAG true
    Emitter_Name  re_emitted_errors

# -----------------------------------------------------------------------------
# 2) Iceberg 用タグ派生 (error.* -> iceberg.*)
#    CloudWatch には素の OTel エラーレコードを残しつつ、Iceberg 向けには別タグの
#    コピーを作り、後段の Lua 変換 (スキーマ整形) を Iceberg 系統だけに適用する。
#    error.* は既に ERROR/FATAL のみのため、同じ文字列条件で全件を iceberg.* へ複製。
#    第4引数 true で error.* を保持 (CloudWatch 出力用)。
# -----------------------------------------------------------------------------
[FILTER]
    Name          rewrite_tag
    Match         error.*
    Rule          $severityText ^(ERROR|FATAL) iceberg.$TAG true
    Emitter_Name  re_emitted_iceberg

# -----------------------------------------------------------------------------
# 3) Iceberg スキーマへの変換 (iceberg.* のみ)
#    OTel フィールドを小文字フラットスキーマ (event_time / severity_number /
#    severity_text / body / resource_json / attributes_json / ingest_date) へ
#    変換し、レコードを置換する。resource/attributes は JSON 文字列化する。
#    関連要件: 5.4, 5.5, 6.5 (Iceberg_Schema_Mapping)
# -----------------------------------------------------------------------------
[FILTER]
    Name    lua
    Match   iceberg.*
    Script  /fluent-bit/etc/iceberg_transform.lua
    Call    transform

# -----------------------------------------------------------------------------
# 4) 全ログ -> Amazon Data Firehose (full-logs / S3 raw)
#    元タグ app-firelens* (展開済み OTel + ECS メタデータ) を全件配信する。
#    error.* / iceberg.* (派生コピー) はマッチさせず重複配信を避ける。
#    関連要件: 3.4 (kinesis_firehose 出力), 4.2 (全ログを S3 へ), 4.3 (絞り込みなし)
# -----------------------------------------------------------------------------
[OUTPUT]
    Name            kinesis_firehose
    Match           app-firelens*
    region          ap-northeast-1
    delivery_stream ${FULL_LOGS_STREAM}

# -----------------------------------------------------------------------------
# 5) Error_Log -> Amazon CloudWatch Logs
#    error.* タグ (ERROR 以上 / 素の OTel 形式) のみを CloudWatch Logs へ配信する。
#    関連要件: 4.1 (Error_Log を CloudWatch Logs へ)
# -----------------------------------------------------------------------------
[OUTPUT]
    Name              cloudwatch_logs
    Match             error.*
    region            ap-northeast-1
    log_group_name    ${ERROR_LOG_GROUP}
    log_stream_prefix ecs-
    auto_create_group true

# -----------------------------------------------------------------------------
# 6) Error_Log -> Amazon Data Firehose (S3 Tables マネージド Iceberg)
#    iceberg.* タグ (変換済みスキーマ) のみを S3 Tables Iceberg 配信ストリームへ送る。
#    関連要件: 5.2 (Error_Log を S3 Tables Iceberg へ Iceberg 配信)
# -----------------------------------------------------------------------------
[OUTPUT]
    Name            kinesis_firehose
    Match           iceberg.*
    region          ap-northeast-1
    delivery_stream ${S3TABLES_ICEBERG_STREAM}

# -----------------------------------------------------------------------------
# 7) Error_Log -> Amazon Data Firehose (Glue Data Catalog Iceberg)
#    iceberg.* タグ (変換済みスキーマ) のみを Glue Iceberg 配信ストリームへ送る。
#    関連要件: 6.3 (Error_Log を Glue Iceberg へ Iceberg 配信)
# -----------------------------------------------------------------------------
[OUTPUT]
    Name            kinesis_firehose
    Match           iceberg.*
    region          ap-northeast-1
    delivery_stream ${GLUE_ICEBERG_STREAM}
