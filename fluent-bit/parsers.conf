# =============================================================================
# Fluent Bit parser 定義 (FireLens カスタムイメージにベイク)
# custom.conf の [SERVICE] Parsers_File から読み込まれる。
#
# otel_json:
#   app コンテナの stdout は awsfirelens ログドライバ経由で Fluent Bit に届くが、
#   アプリの OTel JSON は record の "log" キーに **文字列** として格納される。
#   この parser で "log" を JSON としてパースし、severityNumber 等を
#   トップレベルフィールドへ展開する (rewrite_tag / Iceberg 変換の前提)。
#   Time_Key は設定しない (timestamp フィールドは event_time/ingest_date 導出に使うため
#   レコードに残す)。
# =============================================================================
[PARSER]
    Name   otel_json
    Format json
